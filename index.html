<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Proof-of-Skill Ledger</title>
  <link rel="stylesheet" href="css/base.css"/>
  <link rel="stylesheet" href="css/skills.css"/>
  <link rel="stylesheet" href="css/timeline.css"/>
  <link rel="stylesheet" href="css/companion.css"/>
  <link rel="stylesheet" href="css/ledger.css"/>
</head>
<body>
<div id="app">

  <!-- Star field (rendered by stars.js) -->
  <svg id="stars-svg" class="stars" preserveAspectRatio="xMidYMid slice"
       xmlns="http://www.w3.org/2000/svg"></svg>

  <div class="content">

    <!-- Header -->
    <div class="hdr">
      <div class="hdr-dot"></div>
      <div class="hdr-title">Proof-of-Skill Ledger</div>
      <div class="score-pill" id="score-pill">Score: 0</div>
    </div>

    <!-- Skill Donuts -->
    <section class="skills-section">
      <div class="skills-header">Skill growth — updates with each milestone</div>
      <div class="skills-grid" id="skills-grid"></div>
    </section>

    <!-- Main grid -->
    <div class="main-grid">

      <!-- Timeline -->
      <div class="timeline-col">
        <div class="tl-label">Journey arc — click any point to explore</div>
        <svg id="svg-timeline" viewBox="0 0 480 180" style="height:180px;width:100%;display:block;overflow:visible;"></svg>
        <div class="tick-row" id="tick-row"></div>
        <div class="ev-detail" id="ev-detail">
          <div class="ed-month" id="ed-month"></div>
          <div class="ed-title" id="ed-title-el"></div>
          <div class="ed-desc"  id="ed-desc"></div>
          <div class="ed-delta" id="ed-delta"></div>
          <div id="ed-goal"></div>
        </div>
      </div>

      <!-- Right panel -->
      <div class="right-panel">
        <div class="companion" id="companion-card">
          <div class="tama-level" id="tama-level">Egg</div>
          <svg id="tama-svg" class="tama-svg-el" viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg"></svg>
          <div class="sbar">
            <div class="sbar-track"><div class="sbar-fill" id="sbar-fill"></div></div>
            <div class="sbar-pct" id="sbar-pct">0%</div>
          </div>
          <div class="speech" id="speech">Click a point on the timeline to hear from your companion...</div>
        </div>
        <div class="ledger-card">
          <div class="ledger-ttl">Journey Log</div>
          <div id="ledger"></div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Data first, then modules, then app entry -->
<script src="js/data.js"></script>
<script src="js/stars.js"></script>
<script src="js/skills.js"></script>
<script src="js/timeline.js"></script>
<script src="js/companion.js"></script>
<script src="js/ledger.js"></script>
<script src="js/app.js"></script>
</body>
</html>
